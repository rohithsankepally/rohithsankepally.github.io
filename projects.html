---
layout: default
title : Projects
published: true
---
<ul class="post-list">
  {% for post in site.posts %}
    {% if post.project == true %}
    <li>
      {% if post.link %}
        <a href="{{ post.link }}" target="_blank">{{ post.title }}</a>
      {% else %}
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      {% endif %}
    </li>
    {% endif %}
  {% endfor %}
</ul>
